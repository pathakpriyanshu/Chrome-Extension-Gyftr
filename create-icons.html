<!DOCTYPE html>
<!-- Open this file in a browser, then right-click each canvas and "Save image as" to icons/ folder -->
<html>
<body style="display:flex;gap:24px;align-items:flex-end;padding:24px;background:#eee;font-family:sans-serif">
<script>
function draw(id, size) {
  const c = document.getElementById(id)
  c.width = c.height = size
  const ctx = c.getContext('2d')
  ctx.fillStyle = '#FF6B35'
  ctx.beginPath()
  ctx.roundRect(0, 0, size, size, size * 0.18)
  ctx.fill()
  ctx.fillStyle = '#fff'
  ctx.font = `bold ${Math.floor(size * 0.58)}px Arial,sans-serif`
  ctx.textAlign = 'center'
  ctx.textBaseline = 'middle'
  ctx.fillText('G', size / 2, size / 2 + size * 0.02)
}
</script>
<div style="text-align:center">
  <canvas id="c16"></canvas><br><small>icon16.png</small>
</div>
<div style="text-align:center">
  <canvas id="c48"></canvas><br><small>icon48.png</small>
</div>
<div style="text-align:center">
  <canvas id="c128"></canvas><br><small>icon128.png</small>
</div>
<script>
draw('c16', 16); draw('c48', 48); draw('c128', 128)
</script>
</body>
</html>
