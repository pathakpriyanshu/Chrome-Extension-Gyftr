<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GYFTR Voucher Assistant</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { width: 360px; min-height: 480px; font-family: system-ui, sans-serif; background: #fafafa; }
      @keyframes gyftr-spin { to { transform: rotate(360deg); } }
      @keyframes gyftr-fade-up {
        from { opacity: 0; transform: translateY(8px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes gyftr-pop {
        0% { transform: scale(0.6); opacity: 0; }
        60% { transform: scale(1.15); }
        100% { transform: scale(1); opacity: 1; }
      }
      .gyftr-fade-up { animation: gyftr-fade-up 0.35s ease both; }
      .gyftr-pop { animation: gyftr-pop 0.4s cubic-bezier(0.2, 0.8, 0.3, 1.4) both; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./src/popup/main.jsx"></script>
  </body>
</html>
